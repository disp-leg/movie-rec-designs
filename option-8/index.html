<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Collected — Film Picks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream: #F5F0E8;
  --stone: #D4CFC4;
  --sage: #B8C5B0;
  --sage-light: #dce5d7;
  --slate: #4A5568;
  --slate-light: #718096;
  --rose: #E8D5D5;
  --white: #FFFFFF;
  --text: #2D3748;
  --text-light: #718096;
  --font: 'Plus Jakarta Sans', -apple-system, sans-serif;
  --radius: 20px;
  --radius-sm: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.06);
  --shadow-hover: 0 8px 32px rgba(0,0,0,0.1);
  --ease: cubic-bezier(0.25, 0.1, 0.25, 1);
}

html { font-size: 16px; }

body {
  font-family: var(--font);
  font-weight: 400;
  background: var(--cream);
  color: var(--text);
  max-width: 430px;
  margin: 0 auto;
  overflow-x: hidden;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

::selection { background: var(--sage); color: var(--white); }

/* === HEADER === */
.header {
  padding: 48px 20px 24px;
}

.header-logo {
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
}

.header-logo .dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: var(--sage);
  border-radius: 50%;
  margin-left: 2px;
  vertical-align: super;
}

.header-sub {
  font-size: 14px;
  color: var(--text-light);
  margin-top: 6px;
  font-weight: 400;
}

.header-pills {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  overflow-x: auto;
  padding-bottom: 4px;
}

.header-pills::-webkit-scrollbar { display: none; }

.header-pills a {
  flex-shrink: 0;
  font-size: 12px;
  font-weight: 500;
  color: var(--slate);
  background: var(--white);
  padding: 8px 16px;
  border-radius: 100px;
  text-decoration: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  transition: background 0.3s var(--ease), color 0.3s var(--ease), transform 0.3s var(--ease);
}

.header-pills a:hover {
  background: var(--sage);
  color: var(--white);
  transform: translateY(-1px);
}

/* === TIER SECTION === */
.tier-section {
  padding: 8px 0 0;
}

.tier-label {
  padding: 20px 20px 12px;
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.tier-label .num {
  font-size: 12px;
  font-weight: 600;
  color: var(--sage);
  background: var(--sage-light);
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.tier-label .title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
}

.tier-label .count {
  font-size: 12px;
  color: var(--text-light);
  margin-left: auto;
}

.tier-desc {
  font-size: 13px;
  color: var(--text-light);
  padding: 0 20px 14px;
}

/* === BENTO GRID === */
.bento-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 0 14px 20px;
}

/* === BENTO TILE === */
.bento-tile {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: transform 0.35s var(--ease), box-shadow 0.35s var(--ease);
  opacity: 0;
  transform: translateY(12px);
}

.bento-tile.visible {
  opacity: 1;
  transform: translateY(0);
  transition: opacity 0.5s var(--ease), transform 0.5s var(--ease), box-shadow 0.35s var(--ease);
}

.bento-tile:hover,
.bento-tile:active {
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
}

.bento-tile.visible:hover,
.bento-tile.visible:active {
  transform: translateY(-2px);
}

/* Sizing variants */
.bento-tile.wide { grid-column: span 2; }
.bento-tile.tall { grid-row: span 2; }

/* === TILE: FEATURED (wide) === */
.tile-featured {
  display: grid;
  grid-template-columns: 120px 1fr;
  min-height: 160px;
}

.tile-featured .tile-poster {
  position: relative;
  overflow: hidden;
}

.tile-featured .tile-poster img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s var(--ease);
}

.bento-tile:hover .tile-poster img {
  transform: scale(1.03);
}

.tile-featured .tile-body {
  padding: 14px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* === TILE: POSTER (1x1) === */
.tile-poster-cell {
  position: relative;
  min-height: 220px;
}

.tile-poster-cell img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s var(--ease);
}

.bento-tile:hover .tile-poster-cell img {
  transform: scale(1.03);
}

.tile-poster-cell .tile-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 14px;
  background: linear-gradient(transparent 0%, rgba(0,0,0,0.55) 100%);
  color: var(--white);
}

.tile-poster-cell .tile-overlay .tile-name {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.2;
}

.tile-poster-cell .tile-overlay .tile-year {
  font-size: 12px;
  opacity: 0.8;
  margin-top: 2px;
}

/* === TILE: COMPACT (1x1) === */
.tile-compact {
  padding: 14px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 140px;
}

/* === TILE: TALL (poster-dominant) === */
.tile-tall-inner {
  position: relative;
  height: 100%;
  min-height: 340px;
}

.tile-tall-inner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s var(--ease);
}

.bento-tile:hover .tile-tall-inner img {
  transform: scale(1.03);
}

.tile-tall-inner .tile-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 16px;
  background: linear-gradient(transparent 0%, rgba(0,0,0,0.6) 100%);
  color: var(--white);
}

/* === SHARED TILE TEXT === */
.tile-name {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.25;
  color: var(--text);
  letter-spacing: -0.01em;
}

.tile-year-dir {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 3px;
}

.tile-year-dir .yr { color: var(--sage); font-weight: 600; }

.tile-rating {
  font-size: 12px;
  color: var(--slate-light);
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.tile-rating .stars {
  color: var(--sage);
  letter-spacing: 1px;
}

.tile-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 8px;
}

.tile-tags span {
  font-size: 10px;
  font-weight: 500;
  color: var(--slate);
  background: var(--cream);
  padding: 3px 8px;
  border-radius: 6px;
}

.tile-streaming {
  font-size: 11px;
  color: var(--text-light);
  margin-top: 6px;
}

.tile-streaming .plat {
  color: var(--slate);
  font-weight: 500;
}

.tile-expand-hint {
  font-size: 10px;
  color: var(--sage);
  font-weight: 600;
  margin-top: 6px;
  letter-spacing: 0.03em;
}

/* === COLOR ACCENT BACKGROUNDS FOR COMPACT TILES === */
.bg-sage { background: var(--sage-light); }
.bg-rose { background: var(--rose); }
.bg-stone { background: var(--stone); }
.bg-cream-alt { background: #EDE8DD; }

/* === EXPANDED DETAILS OVERLAY === */
.tile-details {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s var(--ease);
}

.tile-details.open {
  max-height: 500px;
}

.tile-details-inner {
  padding: 0 14px 14px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
}

.tile-details-inner .dl {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--sage);
  margin-bottom: 4px;
  margin-top: 10px;
}

.tile-details-inner .dl:first-child { margin-top: 0; }

.tile-details-inner .dt {
  color: var(--text-light);
  margin-bottom: 8px;
}

.tile-details-inner .dna-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.tile-details-inner .dna-wrap span {
  font-size: 10px;
  font-weight: 500;
  background: var(--sage);
  color: var(--white);
  padding: 3px 8px;
  border-radius: 6px;
}

/* Divider line overlay details */
.tile-details-inner .divider {
  height: 1px;
  background: var(--stone);
  margin: 10px 0;
}

/* === FOOTER === */
.footer {
  padding: 30px 20px 50px;
  text-align: center;
}

.footer-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}

.footer-chip {
  background: var(--white);
  border-radius: var(--radius-sm);
  padding: 12px 8px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.04);
  text-align: center;
}

.footer-chip .fc-num {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}

.footer-chip .fc-label {
  font-size: 10px;
  color: var(--text-light);
  margin-top: 2px;
  font-weight: 500;
}

.footer-note {
  font-size: 11px;
  color: var(--text-light);
  margin-top: 16px;
  line-height: 1.7;
}

.footer-end {
  font-size: 12px;
  font-weight: 600;
  color: var(--sage);
  margin-top: 20px;
  letter-spacing: 0.06em;
}
</style>
</head>

  { id:18, title:"Breathing Room", year:2008, director:"Suits & Cowan", tier:"t4", genre_tags:["thriller","survival game","puzzle"], dna:["claustrophobia","survival"], rating:2.4, why:"Strangers wake in a locked room with explosive collars. Ultra-low-budget but effective confined-space tension.", streaming:{svod:[],avod:["Tubi"]}, poster:"https://image.tmdb.org/t/p/w500/aaz4rgsEjApkUz87OrFT6sNZDks.jpg", fallback:"https://m.media-amazon.com/images/M/MV5BMTYzMDUwMDEzOV5BMl5BanBnXkFtZTcwMjk2OTkyMg@@._V1_.jpg" },
  { id:19, title:"The Hole", year:2001, director:"Nick Hamm", tier:"t4", genre_tags:["psychological thriller","bunker","teen horror"], dna:["claustrophobia","isolation","bunker"], rating:2.9, why:"Four teens lock themselves in a WWII bunker for a party. Things go wrong. Early Keira Knightley.", streaming:{svod:["Amazon Prime"],avod:[]}, poster:"https://image.tmdb.org/t/p/w500/n5aMoI6AZLJzUoNbjMj0P60EYMJ.jpg", fallback:"https://m.media-amazon.com/images/M/MV5BMjE0MTk3OTQ3MF5BMl5BanBnXkFtZTYwNjI0Nzc5._V1_.jpg" },
  { id:20, title:"The Bunker", year:2024, director:"Adrian Langley", tier:"t4", genre_tags:["post-apocalyptic","bunker","indie horror"], dna:["isolation","claustrophobia","survival","bleak"], rating:2.6, why:"Survivors in a bunker after nuclear event. The most direct spiritual successor to The Divide.", streaming:{svod:[],avod:["Tubi","Amazon Prime"]}, poster:"https://image.tmdb.org/t/p/w500/jOA7chFPVzSyPp2DaRg8hqA1BHr.jpg", fallback:"https://m.media-amazon.com/images/M/MV5BODMxMjE0MmQtZjE4OC00NzQ4LWExZjAtOGRmZWRiYWViNTdmXkEyXkFqcGc@._V1_.jpg" }
];

var TIERS = [
  { key:"t1", num:"01", label:"Direct Matches", desc:"Closest in tone and intensity to The Divide", id:"tier-1", count:5 },
  { key:"t2", num:"02", label:"Claustrophobic", desc:"Confined-space tension with group dynamics", id:"tier-2", count:5 },
  { key:"t3", num:"03", label:"Survival", desc:"High-concept survival with moral dilemmas", id:"tier-3", count:5 },
  { key:"t4", num:"04", label:"Adjacent Cuts", desc:"Shares DNA but diverges in subgenre", id:"tier-4", count:5 }
];

/* Tile layout patterns per tier - mix of wide, tall, compact, poster */
var LAYOUTS = {
  t1: ['featured', 'poster', 'poster', 'compact-sage', 'featured'],
  t2: ['poster', 'compact-rose', 'featured', 'poster', 'compact-stone'],
  t3: ['featured', 'poster', 'compact-sage', 'poster', 'featured'],
  t4: ['compact-rose', 'poster', 'featured', 'poster', 'compact-stone']
};

var BG_MAP = {
  'compact-sage': 'bg-sage',
  'compact-rose': 'bg-rose',
  'compact-stone': 'bg-stone'
};

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) {
    Object.keys(attrs).forEach(function(k) {
      if (k === 'className') e.className = attrs[k];
      else if (k === 'onclick') e.onclick = attrs[k];
      else e.setAttribute(k, attrs[k]);
    });
  }
  if (typeof children === 'string') e.textContent = children;
  else if (Array.isArray(children)) children.forEach(function(c) { if (c) e.appendChild(c); });
  else if (children instanceof Node) e.appendChild(children);
  return e;
}

function starsText(r) {
  var s = '';
  for (var i = 1; i <= 5; i++) s += i <= Math.round(r) ? '\u2605' : '\u2606';
  return s;
}

function streamText(s) {
  var all = [];
  s.svod.forEach(function(p) { all.push(p); });
  s.avod.forEach(function(p) { all.push(p + ' (free)'); });
  return all.length ? all.join(' \u00b7 ') : 'check availability';
}

function toggleTile(id) {
  var d = document.getElementById('det-' + id);
  if (d) d.classList.toggle('open');
}

function buildTile(movie, layout) {
  var mid = movie.id;
  var isFeatured = layout === 'featured';
  var isPoster = layout === 'poster';
  var isCompact = layout.startsWith('compact');

  var tile = document.createElement('div');
  var classes = 'bento-tile';
  if (isFeatured) classes += ' wide';
  if (isCompact && BG_MAP[layout]) classes += ' ' + BG_MAP[layout];
  tile.className = classes;
  tile.onclick = function() { toggleTile(mid); };

  var img = document.createElement('img');
  img.src = movie.poster;
  img.alt = movie.title;
  img.loading = 'lazy';
  img.onerror = function() { this.onerror = null; this.src = movie.fallback; };

  if (isFeatured) {
    // Wide tile: poster left, text right
    var inner = el('div', {className:'tile-featured'});
    var posterCol = el('div', {className:'tile-poster'}, [img]);

    var tagsDiv = el('div', {className:'tile-tags'});
    movie.genre_tags.slice(0, 2).forEach(function(t) { tagsDiv.appendChild(el('span', {}, t)); });

    var body = el('div', {className:'tile-body'}, [
      el('div', {}, [
        el('div', {className:'tile-name'}, movie.title),
        el('div', {className:'tile-year-dir'}, [
          el('span', {className:'yr'}, String(movie.year)),
          document.createTextNode(' \u2014 ' + movie.director)
        ]),
        el('div', {className:'tile-rating'}, [
          el('span', {className:'stars'}, starsText(movie.rating)),
          document.createTextNode(' ' + movie.rating.toFixed(1))
        ])
      ]),
      el('div', {}, [
        tagsDiv,
        el('div', {className:'tile-expand-hint'}, 'Tap for more')
      ])
    ]);

    inner.appendChild(posterCol);
    inner.appendChild(body);
    tile.appendChild(inner);

  } else if (isPoster) {
    // Poster-dominant tile with overlay
    var cell = el('div', {className:'tile-poster-cell'});
    cell.appendChild(img);
    var overlay = el('div', {className:'tile-overlay'}, [
      el('div', {className:'tile-name'}, movie.title),
      el('div', {className:'tile-year'}, String(movie.year) + ' \u2014 ' + movie.director)
    ]);
    cell.appendChild(overlay);
    tile.appendChild(cell);

  } else {
    // Compact text tile
    var compact = el('div', {className:'tile-compact'}, [
      el('div', {}, [
        el('div', {className:'tile-name'}, movie.title),
        el('div', {className:'tile-year-dir'}, [
          el('span', {className:'yr'}, String(movie.year)),
          document.createTextNode(' \u2014 ' + movie.director)
        ]),
        el('div', {className:'tile-rating'}, [
          el('span', {className:'stars'}, starsText(movie.rating)),
          document.createTextNode(' ' + movie.rating.toFixed(1))
        ])
      ]),
      el('div', {className:'tile-expand-hint'}, 'Tap for more')
    ]);
    tile.appendChild(compact);
  }

  // Details (shared for all types)
  var dnaWrap = el('div', {className:'dna-wrap'});
  movie.dna.forEach(function(d) { dnaWrap.appendChild(el('span', {}, d)); });

  var allTags = el('div', {className:'tile-tags'});
  movie.genre_tags.forEach(function(t) { allTags.appendChild(el('span', {}, t)); });

  var details = el('div', {className:'tile-details', id:'det-' + movie.id}, [
    el('div', {className:'tile-details-inner'}, [
      el('div', {className:'dl'}, 'Why this film'),
      el('div', {className:'dt'}, movie.why),
      el('div', {className:'divider'}),
      el('div', {className:'dl'}, 'Streaming'),
      el('div', {className:'dt'}, streamText(movie.streaming)),
      el('div', {className:'dl'}, 'All tags'),
      allTags,
      el('div', {className:'dl'}, 'DNA'),
      dnaWrap
    ])
  ]);
  tile.appendChild(details);

  return tile;
}

function render() {
  var main = document.getElementById('main');

  TIERS.forEach(function(tier) {
    var section = el('section', {className:'tier-section', id:tier.id});

    var label = el('div', {className:'tier-label'}, [
      el('span', {className:'num'}, tier.num),
      el('span', {className:'title'}, tier.label),
      el('span', {className:'count'}, String(tier.count) + ' films')
    ]);
    section.appendChild(label);
    section.appendChild(el('p', {className:'tier-desc'}, tier.desc));

    var grid = el('div', {className:'bento-grid'});
    var tierMovies = MOVIES.filter(function(m) { return m.tier === tier.key; });
    var layouts = LAYOUTS[tier.key];

    tierMovies.forEach(function(movie, i) {
      var layout = layouts[i] || 'poster';
      grid.appendChild(buildTile(movie, layout));
    });

    section.appendChild(grid);
    main.appendChild(section);
  });
}

function observeTiles() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry, i) {
      if (entry.isIntersecting) {
        // Stagger delay based on position in viewport batch
        var delay = (Array.prototype.indexOf.call(entry.target.parentNode.children, entry.target)) * 80;
        setTimeout(function() {
          entry.target.classList.add('visible');
        }, delay);
      }
    });
  }, { threshold: 0.05 });
  document.querySelectorAll('.bento-tile').forEach(function(t) { observer.observe(t); });
}

render();
observeTiles();
</script>
