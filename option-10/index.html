<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Crate Dig - Film Discoveries</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#2D2D2D;--bg2:#363030;--sleeve:#F0EAD6;--brown:#5C4033;--red:#C74B50;--gold:#B8A88A;
--vinyl:#1A1614;--groove:#2A2420;
--txt:rgba(240,234,214,.94);--txt2:rgba(240,234,214,.6);--txt3:rgba(240,234,214,.38);
--card:rgba(240,234,214,.06);--card2:rgba(240,234,214,.1);
--bd:rgba(240,234,214,.08);
}
html{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden;position:relative;background:var(--bg)}
::-webkit-scrollbar{width:0}
h1,h2,h3,.heading{font-family:'Space Grotesk',system-ui,sans-serif}

/* Paper grain texture */
body::before{content:"";position:fixed;inset:0;z-index:0;opacity:.035;
background-image:url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
pointer-events:none}

.cnt{position:relative;z-index:1;padding-bottom:110px}

/* NAV */
nav{position:fixed;top:0;left:50%;transform:translateX(-50%);width:430px;z-index:100;padding:52px 20px 12px;
background:rgba(45,45,45,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);transition:background .3s}
nav.sc{background:rgba(45,45,45,.96)}
.ni{display:flex;align-items:center;justify-content:space-between}
.nbr{display:flex;align-items:center;gap:10px}
.nlogo{width:32px;height:32px;border-radius:50%;background:var(--vinyl);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;position:relative}
.nlogo::after{content:"";width:6px;height:6px;border-radius:50%;background:var(--gold)}
.ntitle{font-family:'Space Grotesk',sans-serif;font-size:21px;font-weight:700;letter-spacing:-.5px;color:var(--sleeve)}
.nacts{display:flex;gap:8px}
.nbtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--bd);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt2);transition:all .2s}
.nbtn:active{transform:scale(.9);background:var(--card2)}

/* NOW PLAYING HERO */
.hero{padding:108px 16px 16px}
.np{background:var(--card);border-radius:20px;border:1px solid var(--bd);overflow:hidden;cursor:pointer;transition:transform .3s;position:relative}
.np:active{transform:scale(.98)}
.np-top{padding:14px 18px 0;display:flex;align-items:center;gap:8px}
.np-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.np-lbl{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--red)}
.np-body{display:flex;align-items:center;padding:14px 18px 18px;gap:18px}

/* Spinning disc */
.disc-w{position:relative;flex-shrink:0}
.disc{border-radius:50%;background:var(--vinyl);position:relative;box-shadow:0 4px 20px rgba(0,0,0,.45)}
.disc::before{content:"";position:absolute;inset:8px;border-radius:50%;
background:repeating-radial-gradient(circle at center,transparent,transparent 2px,rgba(240,234,214,.025) 2.5px,transparent 3px)}
.disc::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 3px var(--vinyl),0 0 0 5px rgba(184,168,138,.25)}
.disc.spin{animation:spin 3.5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.disc-img{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;overflow:hidden}
.disc-img img{width:100%;height:100%;object-fit:cover;border-radius:50%}
/* hero disc */
.disc-hero{width:115px;height:115px}
.disc-hero .disc-img{width:42px;height:42px}
/* detail disc */
.disc-detail{width:150px;height:150px}
.disc-detail .disc-img{width:56px;height:56px}

/* Needle arm */
.needle-w{position:absolute;top:-2px;right:8px;width:40px;height:60px;z-index:2;pointer-events:none}
.needle{width:2px;height:50px;background:linear-gradient(to bottom,var(--gold),rgba(184,168,138,.4));border-radius:1px;transform-origin:top center;transform:rotate(-25deg);transition:transform .6s cubic-bezier(.4,0,.2,1);position:absolute;top:4px;right:12px}
.needle::before{content:"";position:absolute;top:-3px;left:-3px;width:8px;height:8px;border-radius:50%;background:var(--gold)}
.needle::after{content:"";position:absolute;bottom:-1px;left:-1px;width:4px;height:4px;border-radius:50%;background:var(--red)}
.needle.drop{transform:rotate(0deg)}

.np-info{flex:1;min-width:0}
.np-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;line-height:1.2;margin-bottom:3px;color:var(--sleeve)}
.np-meta{font-size:12px;color:var(--txt3);margin-bottom:6px;display:flex;gap:8px;align-items:center}
.rt{color:var(--gold);font-weight:600}
.np-desc{font-size:12px;line-height:1.5;color:var(--txt2);font-weight:300;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.np-badges{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.sb{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:500;background:rgba(184,168,138,.12);border:1px solid rgba(184,168,138,.2);color:var(--gold)}
.sb.f{background:rgba(240,234,214,.05);border-color:var(--bd);color:var(--txt2)}

/* CRATE SECTION */
.crate{padding:0 16px;margin-top:28px}
.crate-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;opacity:0;transform:translateY(16px);transition:all .5s ease}
.crate-hdr.v{opacity:1;transform:translateY(0)}
.crate-num{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;flex-shrink:0}
.ct1 .crate-num{background:rgba(199,75,80,.15);color:var(--red);border:1px solid rgba(199,75,80,.25)}
.ct2 .crate-num{background:rgba(184,168,138,.12);color:var(--gold);border:1px solid rgba(184,168,138,.2)}
.ct3 .crate-num{background:rgba(92,64,51,.2);color:#C4A882;border:1px solid rgba(92,64,51,.35)}
.ct4 .crate-num{background:rgba(240,234,214,.07);color:var(--sleeve);border:1px solid var(--bd)}
.crate-ti{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.3px}
.crate-ds{font-size:11px;color:var(--txt3);font-weight:300;margin-top:1px}

/* HORIZONTAL CRATE SCROLL */
.crate-row{display:flex;gap:14px;overflow-x:auto;padding:2px 0 18px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.crate-row::-webkit-scrollbar{display:none}

/* FLIPCARD SLEEVE */
.flip-w{width:150px;flex-shrink:0;scroll-snap-align:start;perspective:800px;cursor:pointer;
opacity:0;transform:translateY(18px);transition:opacity .4s,transform .4s}
.flip-w.v{opacity:1;transform:translateY(0)}
.flip-inner{position:relative;width:150px;height:225px;transition:transform .6s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.flip-w.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;overflow:hidden}
/* Front — album sleeve */
.flip-front{box-shadow:0 6px 22px rgba(0,0,0,.35);border:1px solid rgba(240,234,214,.06)}
.flip-front img{width:100%;height:100%;object-fit:cover;display:block}
/* Vinyl peeking out right side */
.vinyl-peek{position:absolute;top:50%;right:-10px;transform:translateY(-50%);width:50px;height:50px;border-radius:50%;background:var(--vinyl);opacity:0;transition:all .35s;box-shadow:-2px 0 8px rgba(0,0,0,.3)}
.vinyl-peek::before{content:"";position:absolute;inset:5px;border-radius:50%;background:repeating-radial-gradient(circle,transparent,transparent 1px,rgba(240,234,214,.04) 1.5px,transparent 2px)}
.vinyl-peek::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:7px;height:7px;border-radius:50%;background:var(--gold)}
.flip-w:hover .vinyl-peek,.flip-w:active .vinyl-peek{opacity:1;right:-16px}
/* Rating label on disc */
.front-rate{position:absolute;bottom:8px;left:8px;padding:3px 8px;border-radius:6px;background:rgba(26,22,20,.75);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);font-size:11px;font-weight:600;color:var(--gold)}
/* Back — liner notes */
.flip-back{transform:rotateY(180deg);background:var(--sleeve);color:#2D2D2D;padding:14px;display:flex;flex-direction:column;border:1px solid rgba(0,0,0,.08)}
.back-title{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#2D2D2D;margin-bottom:2px}
.back-meta{font-size:11px;color:#5C4033;margin-bottom:6px}
.back-desc{font-size:10px;line-height:1.5;color:#5C4033;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:7;-webkit-box-orient:vertical}
.back-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.back-tag{font-size:9px;padding:2px 6px;background:rgba(92,64,51,.1);border:1px solid rgba(92,64,51,.15);border-radius:4px;color:#5C4033}
.back-hint{font-size:9px;color:rgba(92,64,51,.5);text-align:center;margin-top:auto;padding-top:6px}

.flip-label{padding:7px 2px 0;text-align:left}
.flip-title{font-size:13px;font-weight:600;line-height:1.2;color:var(--sleeve);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.flip-meta{font-size:11px;color:var(--txt3);margin-top:2px;display:flex;gap:6px}

/* VERTICAL LIST (tier 4) */
.crate-list{display:flex;flex-direction:column;gap:10px}
.rec{display:flex;gap:14px;padding:12px;background:var(--card);border-radius:14px;border:1px solid var(--bd);cursor:pointer;transition:all .3s;opacity:0;transform:translateX(-16px)}
.rec.v{opacity:1;transform:translateX(0)}
.rec:active{transform:scale(.98);background:var(--card2)}
.rec-art{width:64px;height:64px;border-radius:50%;overflow:hidden;flex-shrink:0;box-shadow:0 3px 12px rgba(0,0,0,.3);border:2px solid rgba(240,234,214,.06);position:relative}
.rec-art img{width:100%;height:100%;object-fit:cover}
.rec-art::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;background:var(--bg);border:1px solid rgba(240,234,214,.1)}
.rec-info{flex:1;display:flex;flex-direction:column;justify-content:center;min-width:0}
.rec-title{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;line-height:1.2;color:var(--sleeve);margin-bottom:2px}
.rec-meta{font-size:11px;color:var(--txt3);display:flex;gap:6px;align-items:center;margin-bottom:4px}
.rec-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:9px;padding:2px 6px;background:rgba(240,234,214,.05);border:1px solid var(--bd);border-radius:5px;color:var(--txt3)}

/* DETAIL PANEL */
.dov{position:fixed;inset:0;z-index:200;background:rgba(45,45,45,.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .35s}
.dov.on{opacity:1;pointer-events:all}
.dp{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:430px;max-height:88vh;z-index:201;background:var(--bg2);border:1px solid var(--bd);border-bottom:none;border-radius:24px 24px 0 0;transition:transform .45s cubic-bezier(.32,.72,0,1);overflow-y:auto;overscroll-behavior:contain}
.dp.on{transform:translateX(-50%) translateY(0)}
.dp-handle{width:36px;height:4px;background:rgba(240,234,214,.12);border-radius:2px;margin:12px auto 0}
.dp-hero{display:flex;align-items:center;justify-content:center;padding:24px 16px 12px;gap:20px;position:relative}
.dp-sleeve{width:130px;height:175px;border-radius:12px;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,.4);border:1px solid rgba(240,234,214,.06);flex-shrink:0}
.dp-sleeve img{width:100%;height:100%;object-fit:cover}
.dp-close{position:absolute;top:8px;right:14px;width:32px;height:32px;border-radius:50%;background:rgba(45,45,45,.8);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt);font-size:18px;z-index:3;line-height:1}
.dp-close:active{transform:scale(.9)}
.dp-body{padding:0 20px 40px}
.dp-badge{display:inline-block;padding:4px 10px;background:rgba(199,75,80,.12);border:1px solid rgba(199,75,80,.2);border-radius:16px;font-size:10px;font-weight:600;font-family:'Space Grotesk',sans-serif;color:var(--red);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.dp-body h2{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;line-height:1.15;margin-bottom:4px;color:var(--sleeve)}
.dp-meta{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--txt2);margin-bottom:14px}
.dp-label{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--txt3);margin-bottom:6px;margin-top:18px}
.dp-desc{font-size:14px;line-height:1.65;color:var(--txt2);font-weight:300}
.dp-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.dp-tags .tag{font-size:11px;padding:4px 10px}
.dp-stream{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.dp-stream .sb{font-size:12px;padding:5px 12px}

/* SEARCH */
.sov{position:fixed;inset:0;z-index:150;background:rgba(45,45,45,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);opacity:0;pointer-events:none;transition:opacity .3s;padding:60px 16px 20px}
.sov.on{opacity:1;pointer-events:all}
.sbar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--card);border:1px solid var(--bd);border-radius:14px;margin-bottom:16px}
.sbar input{flex:1;background:transparent;border:none;outline:none;color:var(--sleeve);font-family:inherit;font-size:16px}
.sbar input::placeholder{color:var(--txt3)}
.scan{background:none;border:none;color:var(--red);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer}
.sres{max-height:calc(100vh - 140px);overflow-y:auto}
.sres .rec{opacity:1;transform:none;margin-bottom:8px}

/* FAB */
.fab{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:50;pointer-events:none}
.fbar{display:flex;gap:6px;padding:6px;background:rgba(45,45,45,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--bd);border-radius:18px;pointer-events:all;box-shadow:0 8px 28px rgba(0,0,0,.35)}
.fbi{display:flex;align-items:center;gap:5px;padding:9px 14px;border-radius:12px;border:1px solid transparent;background:transparent;color:var(--txt2);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:all .25s}
.fbi:active{transform:scale(.94)}
.fbi.on{background:rgba(199,75,80,.12);color:var(--sleeve);border-color:rgba(199,75,80,.2)}

@media(hover:hover){
.flip-w:hover{transform:translateY(-4px)}
.rec:hover{background:var(--card2);transform:translateX(4px)}
.nbtn:hover{background:var(--card2)}
.fbi:hover{background:rgba(240,234,214,.06);color:var(--sleeve)}
}
</style>
</head>
<body>
<div class="cnt" id="main">
<nav id="nv">
  <div class="ni">
    <div class="nbr">
      <div class="nlogo"></div>
      <span class="ntitle">Crate Dig</span>
    </div>
    <div class="nacts">
      <button class="nbtn" id="sBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
      <button class="nbtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
    </div>
  </div>
</nav>
</div>
<div class="dov" id="dOv"></div>
<div class="dp" id="dPan"></div>
<div class="sov" id="sOv">
  <div class="sbar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(240,234,214,.35)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="sIn" placeholder="Dig through the crates..." autocomplete="off">
    <button class="scan" id="sCan">Cancel</button>
  </div>
  <div class="sres" id="sRes"></div>
</div>
<div class="fab"><div class="fbar">
  <button class="fbi on" data-f="all"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg> All</button>
  <button class="fbi" data-f="svod"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> Stream</button>
  <button class="fbi" data-f="free"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> Free</button>
</div></div>

var TM={t1:{l:"Direct Matches",ds:"Closest in tone and intensity",n:"1",c:"ct1"},t2:{l:"Claustrophobic",ds:"Confined-space tension",n:"2",c:"ct2"},t3:{l:"Survival Pressure",ds:"High-concept survival",n:"3",c:"ct3"},t4:{l:"Adjacent Cuts",ds:"Shared DNA, different angle",n:"4",c:"ct4"}};
var TO=["t1","t2","t3","t4"],filt="all";

function ce(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e}
function tx(tag,cls,txt){var e=ce(tag,cls);e.textContent=txt;return e}
function mI(src,alt,cls,fbk){var i=ce("img",cls);i.src=src;i.alt=alt;i.loading="lazy";i.onerror=function(){i.onerror=null;i.src=fbk};return i}
function st(r){var s="";for(var i=0;i<Math.floor(r);i++)s+="\u2605";if(r%1>=.4)s+="\u00BD";return s+" "+r}
function ab(p,sv,av){(sv||[]).forEach(function(s){p.appendChild(tx("span","sb",s))});(av||[]).forEach(function(s){p.appendChild(tx("span","sb f",s))})}
function fm(m){if(filt==="all")return true;if(filt==="svod")return m.sv.length>0;return m.av.length>0}

// HERO
function bHero(){
  var h=D.reduce(function(b,m){return m.r>b.r?m:b},D[0]);
  var sec=ce("section","hero");
  var card=ce("div","np");
  card.addEventListener("click",function(){oD(h.id)});
  var top=ce("div","np-top");
  top.appendChild(ce("div","np-dot"));
  top.appendChild(tx("span","np-lbl","Now Playing"));
  card.appendChild(top);
  var body=ce("div","np-body");
  var dw=ce("div","disc-w");
  var disc=ce("div","disc disc-hero spin");
  var dimg=ce("div","disc-img");dimg.appendChild(mI(h.im,h.t,"",h.fb));
  disc.appendChild(dimg);dw.appendChild(disc);
  // Needle
  var nw=ce("div","needle-w");
  var ndl=ce("div","needle drop");
  nw.appendChild(ndl);dw.appendChild(nw);
  body.appendChild(dw);
  var info=ce("div","np-info");
  info.appendChild(tx("div","np-title heading",h.t));
  var meta=ce("div","np-meta");
  meta.appendChild(tx("span","rt",st(h.r)));
  meta.appendChild(tx("span","",String(h.y)));
  meta.appendChild(tx("span","",h.d));
  info.appendChild(meta);
  info.appendChild(tx("p","np-desc",h.w));
  var bd=ce("div","np-badges");ab(bd,h.sv,h.av);info.appendChild(bd);
  body.appendChild(info);
  card.appendChild(body);sec.appendChild(card);return sec;
}

// FLIP SLEEVE (horizontal crate)
function bFlip(m,dl){
  var w=ce("div","flip-w");w.dataset.anim="";w.dataset.delay=String(dl);
  // Single tap = open detail, double tap or long press flips
  var flipTimer=null,tapped=false;
  w.addEventListener("click",function(e){
    if(tapped){clearTimeout(flipTimer);w.classList.toggle("flipped");tapped=false;return}
    tapped=true;
    flipTimer=setTimeout(function(){tapped=false;if(!w.classList.contains("flipped")){oD(m.id)}else{w.classList.remove("flipped")}},280);
  });
  var inner=ce("div","flip-inner");
  // Front
  var front=ce("div","flip-front");
  front.appendChild(mI(m.im,m.t,"",m.fb));
  front.appendChild(tx("span","front-rate",st(m.r)));
  var vp=ce("div","vinyl-peek");front.appendChild(vp);
  inner.appendChild(front);
  // Back
  var back=ce("div","flip-back");
  back.appendChild(tx("div","back-title heading",m.t));
  var bmeta=ce("div","back-meta");
  bmeta.appendChild(document.createTextNode(m.y+" \u2022 "+m.d));
  back.appendChild(bmeta);
  back.appendChild(tx("p","back-desc",m.w));
  var btags=ce("div","back-tags");
  m.tg.forEach(function(g){btags.appendChild(tx("span","back-tag",g))});
  back.appendChild(btags);
  back.appendChild(tx("div","back-hint","tap to open \u2022 double-tap to flip back"));
  inner.appendChild(back);
  w.appendChild(inner);
  // Label below
  var lbl=ce("div","flip-label");
  lbl.appendChild(tx("div","flip-title",m.t));
  var fmeta=ce("div","flip-meta");
  fmeta.appendChild(tx("span","rt",st(m.r)));
  fmeta.appendChild(tx("span","",String(m.y)));
  lbl.appendChild(fmeta);
  w.appendChild(lbl);
  return w;
}

// Record row (vertical)
function bRec(m,dl){
  var r=ce("div","rec");r.dataset.anim="";r.dataset.delay=String(dl);
  r.addEventListener("click",function(){oD(m.id)});
  var art=ce("div","rec-art");art.appendChild(mI(m.im,m.t,"",m.fb));r.appendChild(art);
  var info=ce("div","rec-info");
  info.appendChild(tx("div","rec-title heading",m.t));
  var meta=ce("div","rec-meta");
  meta.appendChild(tx("span","rt",st(m.r)));meta.appendChild(tx("span","",String(m.y)));meta.appendChild(tx("span","",m.d));
  info.appendChild(meta);
  var tags=ce("div","rec-tags");m.tg.slice(0,3).forEach(function(g){tags.appendChild(tx("span","tag",g))});info.appendChild(tags);
  r.appendChild(info);return r;
}

function bCrates(){
  TO.forEach(function(tk,idx){
    var ti=TM[tk];
    var mv=D.filter(function(m){return m.ti===tk&&fm(m)});
    if(!mv.length)return;
    var sec=ce("section","crate");
    var hdr=ce("div","crate-hdr "+ti.c);hdr.dataset.anim="";
    hdr.appendChild(tx("div","crate-num heading",ti.n));
    var inf=ce("div","");
    inf.appendChild(tx("div","crate-ti",ti.l));
    inf.appendChild(tx("div","crate-ds",ti.ds));
    hdr.appendChild(inf);sec.appendChild(hdr);
    if(idx<3){
      var row=ce("div","crate-row");
      mv.forEach(function(m,i){row.appendChild(bFlip(m,i*100))});
      sec.appendChild(row);
    } else {
      var list=ce("div","crate-list");
      mv.forEach(function(m,i){list.appendChild(bRec(m,i*80))});
      sec.appendChild(list);
    }
    document.getElementById("main").appendChild(sec);
  });
  obs();
}

function render(){
  var mn=document.getElementById("main");
  var nav=mn.querySelector("nav");
  while(mn.firstChild)mn.removeChild(mn.firstChild);
  mn.appendChild(nav);mn.appendChild(bHero());bCrates();
}

// DETAIL
function oD(id){
  var m=D.find(function(x){return x.id===id});if(!m)return;
  var ov=document.getElementById("dOv"),pan=document.getElementById("dPan"),ti=TM[m.ti];
  while(pan.firstChild)pan.removeChild(pan.firstChild);
  pan.appendChild(ce("div","dp-handle"));
  var cl=ce("button","dp-close");cl.textContent="\u00D7";cl.addEventListener("click",cD);pan.appendChild(cl);
  var hero=ce("div","dp-hero");
  // Disc
  var dw=ce("div","disc-w");
  var disc=ce("div","disc disc-detail spin");
  var dimg=ce("div","disc-img");dimg.appendChild(mI(m.im,m.t,"",m.fb));
  disc.appendChild(dimg);dw.appendChild(disc);
  // Needle
  var nw=ce("div","needle-w");nw.style.cssText="top:-4px;right:2px";
  var ndl=ce("div","needle");nw.appendChild(ndl);dw.appendChild(nw);
  // Animate needle drop
  setTimeout(function(){ndl.classList.add("drop")},200);
  hero.appendChild(dw);
  var slv=ce("div","dp-sleeve");slv.appendChild(mI(m.im,m.t,"",m.fb));hero.appendChild(slv);
  pan.appendChild(hero);
  var body=ce("div","dp-body");
  body.appendChild(tx("div","dp-badge","Tier "+ti.n+" \u2014 "+ti.l));
  body.appendChild(tx("h2","",m.t));
  var meta=ce("div","dp-meta");meta.appendChild(tx("span","rt",st(m.r)+"/5"));meta.appendChild(tx("span","",String(m.y)));meta.appendChild(tx("span","",m.d));body.appendChild(meta);
  body.appendChild(tx("div","dp-label","Liner Notes"));body.appendChild(tx("p","dp-desc",m.w));
  body.appendChild(tx("div","dp-label","Genre"));
  var dtg=ce("div","dp-tags");m.tg.forEach(function(g){dtg.appendChild(tx("span","tag",g))});body.appendChild(dtg);
  body.appendChild(tx("div","dp-label","Where to Watch"));
  var ds=ce("div","dp-stream");
  if(!m.sv.length&&!m.av.length){ds.appendChild(tx("span","","\u2014 Not currently available"));ds.style.color="var(--txt3)";ds.style.fontSize="13px"}
  else ab(ds,m.sv,m.av);
  body.appendChild(ds);pan.appendChild(body);
  requestAnimationFrame(function(){ov.classList.add("on");pan.classList.add("on");document.body.style.overflow="hidden"});
}
function cD(){document.getElementById("dOv").classList.remove("on");document.getElementById("dPan").classList.remove("on");document.body.style.overflow=""}
document.getElementById("dOv").addEventListener("click",cD);

// SEARCH
var sOv=document.getElementById("sOv"),sIn=document.getElementById("sIn"),sRes=document.getElementById("sRes");
document.getElementById("sBtn").addEventListener("click",function(){sOv.classList.add("on");setTimeout(function(){sIn.focus()},100)});
document.getElementById("sCan").addEventListener("click",function(){sOv.classList.remove("on");sIn.value="";while(sRes.firstChild)sRes.removeChild(sRes.firstChild)});
sIn.addEventListener("input",function(){
  while(sRes.firstChild)sRes.removeChild(sRes.firstChild);
  var q=sIn.value.toLowerCase().trim();if(!q)return;
  var r=D.filter(function(m){return m.t.toLowerCase().indexOf(q)!==-1||m.d.toLowerCase().indexOf(q)!==-1||m.tg.some(function(g){return g.indexOf(q)!==-1})});
  if(!r.length){var np=tx("p","","No records found");np.style.cssText="color:var(--txt3);text-align:center;padding:40px 0";sRes.appendChild(np);return}
  r.forEach(function(m){var rec=bRec(m,0);rec.classList.add("v");rec.onclick=function(){sOv.classList.remove("on");sIn.value="";while(sRes.firstChild)sRes.removeChild(sRes.firstChild);oD(m.id)};sRes.appendChild(rec)});
});

// FILTER
document.querySelectorAll(".fbi").forEach(function(b){
  b.addEventListener("click",function(){
    document.querySelectorAll(".fbi").forEach(function(x){x.classList.remove("on")});
    b.classList.add("on");filt=b.dataset.f;
    var old=document.querySelectorAll(".crate");old.forEach(function(s){s.parentNode.removeChild(s)});
    bCrates();
  });
});

// OBSERVER
var ob;
function obs(){
  if(ob)ob.disconnect();
  ob=new IntersectionObserver(function(es){es.forEach(function(e){
    if(e.isIntersecting){var dl=parseInt(e.target.dataset.delay)||0;setTimeout(function(){e.target.classList.add("v")},dl);ob.unobserve(e.target)}
  })},{threshold:.1,rootMargin:"0px 0px -30px 0px"});
  document.querySelectorAll("[data-anim]:not(.v)").forEach(function(el){ob.observe(el)});
}

// NAV SCROLL
window.addEventListener("scroll",function(){document.getElementById("nv").classList.toggle("sc",window.scrollY>20)},{passive:true});

// SWIPE CLOSE
var tsY=0,dP=document.getElementById("dPan");
dP.addEventListener("touchstart",function(e){tsY=e.touches[0].clientY},{passive:true});
dP.addEventListener("touchmove",function(e){if(e.touches[0].clientY-tsY>80&&dP.scrollTop<=0)cD()},{passive:true});

render();
})();
</script>
