<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stillness — Film Recommendations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root{
    --stone:#E8E0D5;
    --ink:#2C2C2C;
    --moss:#7A8B6F;
    --clay:#C4A882;
    --paper:#F7F3EE;
  }

  html{font-size:16px;scroll-behavior:smooth}

  body{
    font-family:'Inter',sans-serif;
    font-weight:300;
    color:var(--ink);
    background:var(--paper);
    max-width:430px;
    margin:0 auto;
    line-height:1.8;
    letter-spacing:0.01em;
    overflow-x:hidden;
    position:relative;
    -webkit-font-smoothing:antialiased;
  }

  /* Paper texture overlay */
  body::before{
    content:'';
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:9999;
    opacity:0.03;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    background-size:256px 256px;
  }

  /* Scroll progress */
  .scroll-progress{
    position:fixed;
    top:0;left:0;
    height:1px;
    background:var(--moss);
    opacity:0.4;
    z-index:10000;
    width:0%;
    transition:width 0.1s linear;
  }

  /* Drifting petals */
  .petal{
    position:fixed;
    border-radius:50% 0 50% 0;
    pointer-events:none;
    z-index:9998;
    animation:drift linear infinite;
  }
  .petal:nth-child(1){
    background:var(--clay);opacity:0.14;
    width:6px;height:6px;
    left:12%;animation-duration:19s;animation-delay:0s;
  }
  .petal:nth-child(2){
    background:var(--moss);opacity:0.1;
    width:5px;height:5px;
    left:52%;animation-duration:23s;animation-delay:5s;
  }
  .petal:nth-child(3){
    background:var(--clay);opacity:0.08;
    width:4px;height:4px;
    left:78%;animation-duration:26s;animation-delay:9s;
  }
  .petal:nth-child(4){
    background:var(--moss);opacity:0.07;
    width:5px;height:5px;
    left:33%;animation-duration:21s;animation-delay:13s;
  }

  @keyframes drift{
    0%{transform:translateY(-20px) rotate(0deg);opacity:0}
    8%{opacity:var(--o,0.1)}
    92%{opacity:var(--o,0.1)}
    100%{transform:translateY(100vh) rotate(360deg);opacity:0}
  }

  /* Header */
  .header{
    padding:80px 32px 56px;
  }
  .header h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:300;
    font-size:1.5rem;
    letter-spacing:0.18em;
    color:var(--ink);
    opacity:0.65;
  }
  .header .subtitle{
    font-size:0.65rem;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--moss);
    opacity:0.5;
    margin-top:10px;
  }
  .header .anchor{
    margin-top:44px;
    font-size:0.72rem;
    color:var(--ink);
    opacity:0.3;
    line-height:2;
    font-style:italic;
  }
  .header .anchor em{
    font-family:'Cormorant Garamond',serif;
    font-size:0.88rem;
    font-weight:400;
    font-style:italic;
  }

  /* Ink divider */
  .ink-line{
    height:1px;
    margin:0 32px;
    background:var(--ink);
    opacity:0.07;
  }

  /* Tier sections */
  .tier{
    padding:56px 0 36px;
  }
  .tier-header{
    padding:0 32px 44px;
    opacity:0;
    transform:translateY(14px);
    transition:opacity 1s cubic-bezier(0.25,0.1,0.25,1),
               transform 1s cubic-bezier(0.25,0.1,0.25,1);
  }
  .tier-header.visible{opacity:1;transform:translateY(0)}

  .tier-label{
    font-size:0.58rem;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--moss);
    opacity:0.45;
    margin-bottom:6px;
  }
  .tier-title{
    font-family:'Cormorant Garamond',serif;
    font-weight:300;
    font-size:1.1rem;
    color:var(--ink);
    opacity:0.55;
    line-height:1.6;
  }

  /* Movie entry */
  .movie{
    padding:0 32px;
    margin-bottom:52px;
    opacity:0;
    transform:translateY(18px);
    transition:opacity 1.1s cubic-bezier(0.25,0.1,0.25,1),
               transform 1.1s cubic-bezier(0.25,0.1,0.25,1);
  }
  .movie.visible{
    opacity:1;
    transform:translateY(0);
  }

  .poster-wrap{
    margin-bottom:22px;
  }
  .poster-wrap.off-r{padding-left:44px}
  .poster-wrap.off-l{padding-right:44px}

  .poster-wrap img{
    width:100%;
    display:block;
    filter:saturate(0.8);
    opacity:0.82;
    transition:opacity 0.8s cubic-bezier(0.25,0.1,0.25,1);
    box-shadow:0 3px 20px rgba(44,44,44,0.06);
  }
  .poster-wrap img:hover{opacity:1}

  .m-title{
    font-family:'Cormorant Garamond',serif;
    font-weight:300;
    font-size:1.18rem;
    line-height:1.5;
    color:var(--ink);
    cursor:pointer;
    position:relative;
    display:inline;
  }
  .m-title::after{
    content:'';
    position:absolute;
    bottom:-2px;left:0;
    width:0;height:1px;
    background:var(--ink);
    opacity:0.25;
    transition:width 0.6s cubic-bezier(0.25,0.1,0.25,1);
  }
  .m-title:hover::after{width:100%}

  .m-sub{
    font-size:0.67rem;
    color:var(--ink);
    opacity:0.32;
    margin-top:5px;
    letter-spacing:0.04em;
  }

  .m-rating{
    display:inline-block;
    margin-top:7px;
    font-size:0.58rem;
    letter-spacing:0.15em;
    color:var(--moss);
    opacity:0.45;
  }

  .m-hint{
    font-size:0.56rem;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--ink);
    opacity:0.18;
    margin-top:8px;
    transition:opacity 0.5s ease;
  }
  .m-expand:hover .m-hint{opacity:0.3}

  .m-expand{
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }

  /* Expandable details */
  .m-details{
    max-height:0;
    overflow:hidden;
    transition:max-height 1s cubic-bezier(0.25,0.1,0.25,1),
               opacity 0.8s cubic-bezier(0.25,0.1,0.25,1);
    opacity:0;
  }
  .m-details.open{opacity:1}

  .m-details-inner{
    padding-top:18px;
    padding-bottom:6px;
  }
  .m-genre{
    font-size:0.6rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--clay);
    opacity:0.55;
    margin-bottom:10px;
  }
  .m-why{
    font-family:'Cormorant Garamond',serif;
    font-weight:300;
    font-style:italic;
    font-size:0.88rem;
    line-height:1.9;
    color:var(--ink);
    opacity:0.45;
    margin-bottom:14px;
  }
  .m-stream{
    font-size:0.6rem;
    letter-spacing:0.08em;
    color:var(--ink);
    opacity:0.25;
  }
  .m-stream span{margin-right:10px}

  /* Footer */
  .footer{
    padding:76px 32px 100px;
    opacity:0;
    transform:translateY(12px);
    transition:opacity 1s cubic-bezier(0.25,0.1,0.25,1),
               transform 1s cubic-bezier(0.25,0.1,0.25,1);
  }
  .footer.visible{opacity:1;transform:translateY(0)}

  .footer p:first-child{
    font-family:'Cormorant Garamond',serif;
    font-weight:300;
    font-style:italic;
    font-size:0.88rem;
    color:var(--ink);
    opacity:0.22;
    line-height:2;
  }
  .footer p:last-child{
    font-size:0.56rem;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--ink);
    opacity:0.13;
    margin-top:28px;
  }
</style>
</head>
<body>

<div class="scroll-progress" id="sp"></div>

<div class="petal" style="--o:0.14"></div>
<div class="petal" style="--o:0.1"></div>
<div class="petal" style="--o:0.08"></div>
<div class="petal" style="--o:0.07"></div>

<header class="header">
  <h1>stillness</h1>
  <p class="subtitle">film recommendations</p>
  <p class="anchor">
    Twenty films found in the quiet spaces<br>
    surrounding <em>The Divide</em> (2011)
  </p>
</header>

<div class="ink-line"></div>

<main id="fl"></main>

<div class="ink-line"></div>

<footer class="footer">
  <p>In the space between films,<br>something lingers.</p>
  <p>stillness — a contemplative film journal</p>
</footer>

<script>
const M=[
{id:1,t:"Right at Your Door",y:2006,d:"Chris Gorak",ti:"t1_direct_matches",g:"post-apocalyptic, thriller, domestic horror",r:3.1,w:"Dirty bomb hits LA; husband seals himself inside the house while wife is outside. Same claustrophobic domestic apocalypse tension. Paranoia escalates in a sealed space with dwindling trust.",s:["Tubi","Pluto TV"],p:"https://image.tmdb.org/t/p/w500/sBkCtdpkWRiisQ3vzyNOZ72biCB.jpg",f:"https://m.media-amazon.com/images/M/MV5BMTI3NTk3MTk1NF5BMl5BanBnXkFtZTcwNzY3NTIzMQ@@._V1_.jpg"},
{id:2,t:"Hidden",y:2015,d:"Matt Duffer, Ross Duffer",ti:"t1_direct_matches",g:"post-apocalyptic, survival, family horror, bunker",r:3.1,w:"Family hiding in a bunker after an outbreak. Pre-Stranger Things Duffer Brothers. Claustrophobic survival with a twist ending. Same shelter-in-place dread.",s:["Netflix","Amazon Prime"],p:"https://image.tmdb.org/t/p/w500/mPuaHaczkoJDzlYD9GyXiDjMXig.jpg",f:"https://m.media-amazon.com/images/M/MV5BMTQ2NjA5MTA3NF5BMl5BanBnXkFtZTgwNDk1NTg0NTE@._V1_.jpg"},
{id:3,t:"Carriers",y:2009,d:"Alex Pastor, David Pastor",ti:"t1_direct_matches",g:"post-apocalyptic, pandemic, road movie, survival",r:2.8,w:"Four survivors navigate a pandemic wasteland with strict rules to avoid infection. Moral decay under survival pressure mirrors group disintegration.",s:["Amazon Prime","Tubi"],p:"https://image.tmdb.org/t/p/w500/jxjnjHtHXgvjdhkwpelE9ZwVMg6.jpg",f:"https://m.media-amazon.com/images/M/MV5BMTU2NjkwNDMxNV5BMl5BanBnXkFtZTcwMTI4MzIyMg@@._V1_.jpg"},
{id:4,t:"It Comes at Night",y:2017,d:"Trey Edward Shults",ti:"t1_direct_matches",g:"post-apocalyptic, psychological horror, paranoia",r:3.1,w:"Family boarded up in a house during an unspecified plague. Another family arrives. Trust erodes into paranoia and violence. The quintessential who-can-you-trust film.",s:["Netflix","Amazon Prime"],p:"https://image.tmdb.org/t/p/w500/rNKJpFMlOZn5zkzBPZxEJrQn5Km.jpg",f:"https://m.media-amazon.com/images/M/MV5BMjI3ODkzNDk5MF5BMl5BanBnXkFtZTgwNjQ0NTczMjI@._V1_.jpg"},
{id:5,t:"Await Further Instructions",y:2018,d:"Johnny Kevorkian",ti:"t1_direct_matches",g:"sci-fi horror, isolation, family dysfunction",r:2.5,w:"Family trapped in their house on Christmas Day by a mysterious barricade. TV gives increasingly sinister instructions. Sealed-in paranoia with family tensions boiling over.",s:["Netflix","Shudder"],p:"https://image.tmdb.org/t/p/w500/afvi5tVi5S3Ux9faZaI32SmPRkj.jpg",f:"https://m.media-amazon.com/images/M/MV5BYzFiYzI1MGEtYmI4NC00MWNhLTgyZmMtMWJjYTliYjg4YzRjXkEyXkFqcGdeQXVyMjM4NTM5NDY@._V1_.jpg"},
{id:6,t:"Coherence",y:2013,d:"James Ward Byrkit",ti:"t2_claustrophobic",g:"sci-fi, psychological thriller, quantum",r:3.7,w:"Dinner party goes wrong when a comet passes overhead. Reality fractures. Shot in a single house with improvised dialogue. Pure confined-space paranoia.",s:["Amazon Prime","Tubi"],p:"https://image.tmdb.org/t/p/w500/ezUtb9m5DeLwL2gxi4gktzNCvQv.jpg",f:"https://m.media-amazon.com/images/M/MV5BMjMwOTMxNzQzOF5BMl5BanBnXkFtZTgwNTc3NDI3MjE@._V1_.jpg"},
{id:7,t:"Pontypool",y:2008,d:"Bruce McDonald",ti:"t2_claustrophobic",g:"horror, single-location, language virus",r:3.3,w:"Radio DJ trapped in his station as a virus spreads through the English language. Almost entirely one location. The horror is in what you hear, not see.",s:["Shudder","Tubi"],p:"https://image.tmdb.org/t/p/w500/uh4n9FSYYaeOWchP8gBPNtg7kD7.jpg",f:"https://m.media-amazon.com/images/M/MV5BNTk5MTQ1NDAtZGU4ZS00MTJkLWE4NjctYjk0YTVmNGJlYTY0XkEyXkFqcGdeQXVyMTQxNzMzNDI@._V1_.jpg"},
{id:8,t:"The Platform",y:2019,d:"Galder Gaztelu-Urrutia",ti:"t2_claustrophobic",g:"sci-fi horror, social allegory, survival",r:3.4,w:"Vertical prison where food descends level by level. Same resource scarcity and moral collapse but as brutal social allegory.",s:["Netflix"],p:"https://image.tmdb.org/t/p/w500/iXvQnzy6JCAx1PiQEKXuTY04ZHl.jpg",f:"https://m.media-amazon.com/images/M/MV5BMzdjNjI5MmYtODhiNS00NTcyLWEzZmMtMzYyMjI2MmRjYzA2XkEyXkFqcGdeQXVyMTkxNjUyNQ@@._V1_.jpg"},
{id:9,t:"Exam",y:2009,d:"Stuart Hazeldine",ti:"t2_claustrophobic",g:"psychological thriller, single-room, puzzle",r:3.3,w:"Eight candidates in a single room for a final job interview. One question, 80 minutes, strict rules. Group dynamics fracture under pressure.",s:["Tubi","Amazon Prime"],p:"https://image.tmdb.org/t/p/w500/i1J2zBCyOQJKsQipqJ0qXERC1Ma.jpg",f:"https://m.media-amazon.com/images/M/MV5BMTkwNTczNTc0Nl5BMl5BanBnXkFtZTcwMjUzNTM0Mg@@._V1_.jpg"},
{id:10,t:"The Bar",y:2017,d:"Alex de la Iglesia",ti:"t2_claustrophobic",g:"thriller, dark comedy, single-location",r:3.0,w:"Patrons trapped in a Madrid bar after a sniper kills anyone who exits. Paranoia mounts as they turn on each other. Darkly comic locked-room survival.",s:["Netflix","Amazon Prime"],p:"https://image.tmdb.org/t/p/w500/vYyALnKnzHLv4PoU2b447GYT8R9.jpg",f:"https://m.media-amazon.com/images/M/MV5BYzllMjljYWUtOGY2MS00YTI3LTk3NTUtYmZiY2NkNDkxN2Y3XkEyXkFqcGdeQXVyMjMxOTE0ODA@._V1_.jpg"},
{id:11,t:"Circle",y:2015,d:"Aaron Hann, Mario Miscione",ti:"t3_survival",g:"sci-fi, social experiment, survival",r:2.9,w:"50 strangers in a circle. Every 2 minutes, one dies by group vote. Pure survival psychology with no escape. Group dynamics stripped to the absolute minimum.",s:["Netflix","Tubi"],p:"https://image.tmdb.org/t/p/w500/hbIL53MdZFJXsgxXaSOVuApWTs8.jpg",f:"https://m.media-amazon.com/images/M/MV5BMjI3ODkzNDk5MF5BMl5BanBnXkFtZTgwNjQ0NTczMjI@._V1_.jpg"},
{id:12,t:"Would You Rather",y:2012,d:"David Guy Levy",ti:"t3_survival",g:"horror, survival game, dinner party",r:2.8,w:"Desperate guests at a rich man's dinner party forced into increasingly brutal choices. Confined space, escalating violence, moral compromise under duress.",s:["Tubi","Amazon Prime"],p:"https://image.tmdb.org/t/p/w500/tos5MpjaOsAFVGjjieQlZsHlbd.jpg",f:"https://m.media-amazon.com/images/M/MV5BMTkzNjEzNjMwM15BMl5BanBnXkFtZTcwNjMzOTUzOQ@@._V1_.jpg"},
{id:13,t:"Fermat\u2019s Room",y:2007,d:"Luis Piedrahita, Rodrigo Sope\u00f1a",ti:"t3_survival",g:"thriller, puzzle, shrinking room",r:3.2,w:"Four mathematicians locked in a room that shrinks unless they solve puzzles. Literal claustrophobia as survival mechanism. A Spanish-language gem.",s:["Amazon Prime","Tubi"],p:"https://image.tmdb.org/t/p/w500/qQcYvPXxvk6bQDV9Zgd6cnDQmKZ.jpg",f:"https://m.media-amazon.com/images/M/MV5BMTQzOTg1NzY3OF5BMl5BanBnXkFtZTcwODgyNjMwMg@@._V1_.jpg"},
{id:14,t:"Level 16",y:2018,d:"Danishka Esterhazy",ti:"t3_survival",g:"dystopian, sci-fi horror, institutional horror",r:3.0,w:"Girls in a mysterious boarding school discover the horrifying purpose of their captivity. Institutional claustrophobia with a body-horror twist.",s:["Shudder","Tubi"],p:"https://image.tmdb.org/t/p/w500/glVIjhLmzmgtppLWb3lvnoPljGW.jpg",f:"https://m.media-amazon.com/images/M/MV5BMTYzOTE3MDMwN15BMl5BanBnXkFtZTgwMDM0MzA5NjM@._V1_.jpg"},
{id:15,t:"The Incident",y:2014,d:"Isaac Ezban",ti:"t3_survival",g:"sci-fi horror, infinite loop, existential",r:3.1,w:"Two groups trapped in infinite loops \u2014 one in a stairwell, one on a highway. Time passes but space repeats. Existential claustrophobia. A Mexican indie gem.",s:["Amazon Prime","Tubi"],p:"https://image.tmdb.org/t/p/w500/idb1ACZCQAsYJCFMfs9vgyBIbP1.jpg",f:"https://m.media-amazon.com/images/M/MV5BMjEyNDI3NDkwN15BMl5BanBnXkFtZTgwMjY0NjIxNzE@._V1_.jpg"},
{id:16,t:"Pandorum",y:2009,d:"Christian Alvart",ti:"t4_adjacent",g:"sci-fi horror, space, amnesia, survival",r:3.2,w:"Crew wakes on a spaceship with no memory. Something hunts them in the dark. Claustrophobic corridors, resource scarcity, and psychological breakdown in a sealed environment.",s:["Amazon Prime","Tubi"],p:"https://image.tmdb.org/t/p/w500/mNMfa6r3pl0EzFIKEkVcxyr6Rc7.jpg",f:"https://m.media-amazon.com/images/M/MV5BNDhmMjZlNDEtYTk5Mi00N2NhLTgyOTktMDlmNGY0NmIwYzJjXkEyXkFqcGdeQXVyNTIzOTk5ODM@._V1_.jpg"},
{id:17,t:"The Void",y:2016,d:"Jeremy Gillespie, Steven Kostanski",ti:"t4_adjacent",g:"cosmic horror, siege, body horror, Lovecraftian",r:3.0,w:"People trapped in a hospital surrounded by cultists. Cosmic horror seeps in. Practical effects, siege dynamics, escalating dread. Carpenter-esque.",s:["Shudder","Tubi"],p:"https://image.tmdb.org/t/p/w500/2WhZAPi3vomEQdzAPIYTvmvWaxI.jpg",f:"https://m.media-amazon.com/images/M/MV5BMjUyMjgzNTcyMl5BMl5BanBnXkFtZTgwMjY0NjIxNzE@._V1_.jpg"},
{id:18,t:"Breathing Room",y:2008,d:"John Suits, Gabriel Cowan",ti:"t4_adjacent",g:"thriller, survival game, single-room, puzzle",r:2.4,w:"Strangers wake in a locked white room wearing explosive collars. Must figure out the rules or die. Ultra-low-budget but effective confined-space tension.",s:["Tubi"],p:"https://image.tmdb.org/t/p/w500/aaz4rgsEjApkUz87OrFT6sNZDks.jpg",f:"https://m.media-amazon.com/images/M/MV5BMTYzMDUwMDEzOV5BMl5BanBnXkFtZTcwMjk2OTkyMg@@._V1_.jpg"},
{id:19,t:"The Hole",y:2001,d:"Nick Hamm",ti:"t4_adjacent",g:"psychological thriller, bunker, teen horror",r:2.9,w:"Four teens voluntarily lock themselves in a WWII bunker for a party weekend. Things go wrong. The voluntary confinement turning deadly mirrors shelter-gone-wrong.",s:["Amazon Prime"],p:"https://image.tmdb.org/t/p/w500/n5aMoI6AZLJzUoNbjMj0P60EYMJ.jpg",f:"https://m.media-amazon.com/images/M/MV5BMjE0MTk3OTQ3MF5BMl5BanBnXkFtZTYwNjI0Nzc5._V1_.jpg"},
{id:20,t:"The Bunker",y:2024,d:"Adrian Langley",ti:"t4_adjacent",g:"post-apocalyptic, bunker, survival, indie horror",r:2.6,w:"Survivors in a bunker after nuclear event. Resources dwindle, tensions rise, paranoia sets in. The most direct spiritual successor in recent years.",s:["Tubi","Amazon Prime"],p:"https://image.tmdb.org/t/p/w500/jOA7chFPVzSyPp2DaRg8hqA1BHr.jpg",f:"https://m.media-amazon.com/images/M/MV5BODMxMjE0MmQtZjE4OC00NzQ4LWExZjAtOGRmZWRiYWViNTdmXkEyXkFqcGc@._V1_.jpg"}
];

const TM={
  t1_direct_matches:{l:"Tier One",d:"Closest in tone, setting, and psychological intensity"},
  t2_claustrophobic:{l:"Tier Two",d:"Confined-space psychological tension with group dynamics"},
  t3_survival:{l:"Tier Three",d:"High-concept survival scenarios with moral dilemmas"},
  t4_adjacent:{l:"Tier Four",d:"Shares DNA but diverges in subgenre or setting"}
};
const TO=["t1_direct_matches","t2_claustrophobic","t3_survival","t4_adjacent"];

function el(tag, cls, txt) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (txt) e.textContent = txt;
  return e;
}

function buildPage() {
  var main = document.getElementById('fl');
  var frag = document.createDocumentFragment();

  TO.forEach(function(tk, ti) {
    var tm = TM[tk];
    var mv = M.filter(function(m) { return m.ti === tk; });

    var section = el('section', 'tier');

    var header = el('div', 'tier-header');
    header.appendChild(el('p', 'tier-label', tm.l));
    header.appendChild(el('h2', 'tier-title', tm.d));
    section.appendChild(header);

    mv.forEach(function(m, i) {
      var article = el('article', 'movie');

      // Poster
      var pw = el('div', 'poster-wrap ' + (i % 2 === 0 ? 'off-l' : 'off-r'));
      var img = document.createElement('img');
      img.className = 'movie-poster';
      img.src = m.p;
      img.alt = m.t;
      img.loading = 'lazy';
      img.onerror = function() { this.onerror = null; this.src = m.f; };
      pw.appendChild(img);
      article.appendChild(pw);

      // Expandable meta
      var expand = el('div', 'm-expand');
      expand.setAttribute('role', 'button');
      expand.setAttribute('tabindex', '0');
      expand.addEventListener('click', function() { tog(m.id); });
      expand.addEventListener('keydown', function(e) { if (e.key === 'Enter') tog(m.id); });

      expand.appendChild(el('span', 'm-title', m.t));
      expand.appendChild(el('p', 'm-sub', m.y + ' \u2014 ' + m.d));
      expand.appendChild(el('p', 'm-rating', m.r.toFixed(1) + ' on Letterboxd'));
      expand.appendChild(el('p', 'm-hint', 'tap to read more'));
      article.appendChild(expand);

      // Details panel
      var details = el('div', 'm-details');
      details.id = 'd' + m.id;
      var inner = el('div', 'm-details-inner');
      inner.appendChild(el('p', 'm-genre', m.g));
      inner.appendChild(el('p', 'm-why', m.w));

      var streamP = el('p', 'm-stream');
      streamP.appendChild(document.createTextNode('Available on '));
      var sources = m.s.length ? m.s : ['Rental only'];
      sources.forEach(function(src) {
        var sp = document.createElement('span');
        sp.textContent = src;
        streamP.appendChild(sp);
      });
      inner.appendChild(streamP);
      details.appendChild(inner);
      article.appendChild(details);

      section.appendChild(article);
    });

    frag.appendChild(section);

    if (ti < TO.length - 1) {
      frag.appendChild(el('div', 'ink-line'));
    }
  });

  main.appendChild(frag);
}

function tog(id) {
  var det = document.getElementById('d' + id);
  if (det.classList.contains('open')) {
    det.style.maxHeight = '0px';
    det.classList.remove('open');
  } else {
    det.classList.add('open');
    det.style.maxHeight = det.scrollHeight + 'px';
  }
}

buildPage();

// Intersection Observer for fade-in
var obs = new IntersectionObserver(function(entries) {
  entries.forEach(function(entry) {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      obs.unobserve(entry.target);
    }
  });
}, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });

document.querySelectorAll('.movie,.tier-header,.footer').forEach(function(e) {
  obs.observe(e);
});

// Scroll progress
var spBar = document.getElementById('sp');
window.addEventListener('scroll', function() {
  var t = window.scrollY;
  var dh = document.documentElement.scrollHeight - window.innerHeight;
  spBar.style.width = (dh > 0 ? (t / dh) * 100 : 0) + '%';
}, { passive: true });
</script>
</body>
