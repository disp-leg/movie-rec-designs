<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CineScope</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--black:#0A0A0A;--white:#F5F5F5;
--txt:rgba(245,245,245,.95);--txt2:rgba(245,245,245,.65);--txt3:rgba(245,245,245,.4);
--red:#C74B50;--gold:#D4A052;--teal:#4A9B8E;--blue:#4A7DC7;
}
html{font-family:'Inter',system-ui,sans-serif;background:var(--black);color:var(--txt);-webkit-font-smoothing:antialiased}
body{max-width:430px;margin:0 auto;height:100vh;overflow:hidden;position:relative;background:var(--black)}
::-webkit-scrollbar{width:0}

/* SCROLL SNAP CONTAINER */
.snap{height:100vh;overflow-y:auto;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.snap::-webkit-scrollbar{display:none}

/* EACH MOVIE = FULL VIEWPORT */
.scene{height:100vh;width:100%;scroll-snap-align:start;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end}

/* Full-bleed poster background */
.scene-bg{position:absolute;inset:0;z-index:0}
.scene-bg img{width:100%;height:100%;object-fit:cover;filter:contrast(1.1) brightness(0.65) saturate(1.1)}
/* Color-graded overlays per tier */
.scene-grade{position:absolute;inset:0}
.grade-t1{background:linear-gradient(180deg,rgba(199,75,80,.15) 0%,rgba(10,10,10,.3) 40%,rgba(10,10,10,.92) 100%)}
.grade-t2{background:linear-gradient(180deg,rgba(74,155,142,.12) 0%,rgba(10,10,10,.3) 40%,rgba(10,10,10,.92) 100%)}
.grade-t3{background:linear-gradient(180deg,rgba(212,160,82,.12) 0%,rgba(10,10,10,.3) 40%,rgba(10,10,10,.92) 100%)}
.grade-t4{background:linear-gradient(180deg,rgba(74,125,199,.1) 0%,rgba(10,10,10,.3) 40%,rgba(10,10,10,.92) 100%)}

/* Letterbox bars */
.lbox-top,.lbox-bot{position:absolute;left:0;right:0;background:var(--black);z-index:2}
.lbox-top{top:0;height:52px}
.lbox-bot{bottom:0;height:44px}

/* Scene content */
.scene-body{position:relative;z-index:3;padding:0 24px 68px;max-width:100%}

/* Tier badge */
.tier-badge{display:inline-block;padding:4px 10px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;opacity:0;transform:translateY(12px);transition:all .6s ease .1s}
.scene.in .tier-badge{opacity:1;transform:translateY(0)}
.tb-t1{background:rgba(199,75,80,.2);border:1px solid rgba(199,75,80,.35);color:var(--red)}
.tb-t2{background:rgba(74,155,142,.15);border:1px solid rgba(74,155,142,.3);color:var(--teal)}
.tb-t3{background:rgba(212,160,82,.15);border:1px solid rgba(212,160,82,.3);color:var(--gold)}
.tb-t4{background:rgba(74,125,199,.12);border:1px solid rgba(74,125,199,.25);color:var(--blue)}

/* MASSIVE title */
.scene-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,14vw,80px);line-height:.92;letter-spacing:1px;text-transform:uppercase;color:var(--white);margin-bottom:4px;opacity:0;transform:translateY(20px);transition:all .6s ease .2s}
.scene.in .scene-title{opacity:1;transform:translateY(0)}

/* Meta line */
.scene-meta{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--txt2);margin-bottom:10px;opacity:0;transform:translateY(12px);transition:all .5s ease .35s}
.scene.in .scene-meta{opacity:1;transform:translateY(0)}
.scene-meta .rt{color:var(--gold);font-weight:600}
.scene-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--txt3);flex-shrink:0}

/* Description */
.scene-desc{font-size:13px;line-height:1.55;color:var(--txt2);font-weight:300;max-width:360px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;opacity:0;transform:translateY(12px);transition:all .5s ease .45s}
.scene.in .scene-desc{opacity:1;transform:translateY(0)}

/* Streaming badges */
.scene-badges{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;opacity:0;transform:translateY(10px);transition:all .5s ease .55s}
.scene.in .scene-badges{opacity:1;transform:translateY(0)}
.sb{padding:3px 9px;border-radius:5px;font-size:10px;font-weight:500;background:rgba(245,245,245,.08);border:1px solid rgba(245,245,245,.12);color:var(--txt2)}
.sb.sv{background:rgba(212,160,82,.1);border-color:rgba(212,160,82,.2);color:var(--gold)}

/* Tap prompt */
.scene-tap{font-size:11px;color:var(--txt3);margin-top:12px;opacity:0;transform:translateY(8px);transition:all .4s ease .65s;cursor:pointer}
.scene.in .scene-tap{opacity:1;transform:translateY(0)}

/* PROGRESS DOTS */
.dots{position:fixed;right:10px;top:50%;transform:translateY(-50%);z-index:50;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.dot-i{width:6px;height:6px;border-radius:50%;background:rgba(245,245,245,.2);transition:all .3s;pointer-events:all;cursor:pointer}
.dot-i.on{background:var(--white);box-shadow:0 0 6px rgba(245,245,245,.4);width:6px;height:14px;border-radius:3px}

/* SWIPE HINT */
.swipe-hint{position:absolute;bottom:56px;left:50%;transform:translateX(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:4px;animation:swipeHint 2s ease-in-out infinite;pointer-events:none}
.swipe-hint svg{opacity:.4}
.swipe-hint span{font-size:10px;color:var(--txt3);letter-spacing:1px;text-transform:uppercase}
@keyframes swipeHint{0%,100%{transform:translateX(-50%) translateY(0);opacity:1}50%{transform:translateX(-50%) translateY(-10px);opacity:.5}}

/* NAV BAR (top, over letterbox) */
.topbar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:430px;z-index:60;padding:14px 20px 0;display:flex;align-items:center;justify-content:space-between;height:52px}
.topbar-brand{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--white)}
.topbar-acts{display:flex;gap:8px}
.topbar-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(245,245,245,.12);background:rgba(10,10,10,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt2);transition:all .2s}
.topbar-btn:active{transform:scale(.9);background:rgba(245,245,245,.1)}

/* DETAIL PANEL */
.dov{position:fixed;inset:0;z-index:200;background:rgba(10,10,10,.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .3s}
.dov.on{opacity:1;pointer-events:all}
.dpan{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:430px;max-height:80vh;z-index:201;background:rgba(18,18,18,.95);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(245,245,245,.06);border-bottom:none;border-radius:20px 20px 0 0;transition:transform .45s cubic-bezier(.32,.72,0,1);overflow-y:auto;overscroll-behavior:contain}
.dpan.on{transform:translateX(-50%) translateY(0)}
.dp-handle{width:36px;height:4px;background:rgba(245,245,245,.12);border-radius:2px;margin:12px auto 0}
.dp-poster{width:100%;height:220px;position:relative;overflow:hidden}
.dp-poster img{width:100%;height:100%;object-fit:cover;filter:contrast(1.1) brightness(0.6)}
.dp-poster-gr{position:absolute;inset:0;background:linear-gradient(to top,rgba(18,18,18,1) 0%,rgba(18,18,18,.3) 60%,transparent)}
.dp-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:rgba(10,10,10,.6);border:1px solid rgba(245,245,245,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt);font-size:18px;z-index:3;line-height:1;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.dp-close:active{transform:scale(.9)}
.dp-body{padding:0 20px 40px;margin-top:-40px;position:relative;z-index:2}
.dp-body h2{font-family:'Bebas Neue',sans-serif;font-size:38px;line-height:.95;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;color:var(--white)}
.dp-meta{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--txt2);margin-bottom:14px}
.dp-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--txt3);margin-bottom:6px;margin-top:18px}
.dp-desc{font-size:14px;line-height:1.65;color:var(--txt2);font-weight:300}
.dp-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.dp-tags .tag{font-size:11px;padding:4px 10px;background:rgba(245,245,245,.05);border:1px solid rgba(245,245,245,.08);border-radius:5px;color:var(--txt3)}
.dp-stream{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.dp-stream .sb{font-size:12px;padding:5px 12px}

/* SEARCH */
.sov{position:fixed;inset:0;z-index:150;background:rgba(10,10,10,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);opacity:0;pointer-events:none;transition:opacity .3s;padding:60px 16px 20px}
.sov.on{opacity:1;pointer-events:all}
.sbar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(245,245,245,.06);border:1px solid rgba(245,245,245,.08);border-radius:14px;margin-bottom:16px}
.sbar input{flex:1;background:transparent;border:none;outline:none;color:var(--white);font-family:inherit;font-size:16px}
.sbar input::placeholder{color:var(--txt3)}
.scanc{background:none;border:none;color:var(--red);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer}
.sres{max-height:calc(100vh - 130px);overflow-y:auto}
.sres-item{display:flex;gap:12px;padding:12px;border-radius:12px;cursor:pointer;transition:background .2s;margin-bottom:4px}
.sres-item:active{background:rgba(245,245,245,.06)}
.sres-poster{width:50px;height:70px;border-radius:6px;overflow:hidden;flex-shrink:0}
.sres-poster img{width:100%;height:100%;object-fit:cover}
.sres-info{flex:1;display:flex;flex-direction:column;justify-content:center}
.sres-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.5px;text-transform:uppercase;color:var(--white);line-height:1}
.sres-meta{font-size:11px;color:var(--txt3);margin-top:2px}

@media(hover:hover){
.topbar-btn:hover{background:rgba(245,245,245,.08)}
.dot-i:hover{background:rgba(245,245,245,.5)}
}
</style>
</head>

</div>

{id:17,t:"The Void",y:2016,d:"Jeremy Gillespie, Steven Kostanski",ti:"t4",tg:["cosmic horror","siege","Lovecraftian"],r:3.0,w:"People trapped in a hospital surrounded by cultists. Cosmic horror seeps in. Practical effects and escalating dread.",sv:["Shudder"],av:["Tubi"],im:"https://image.tmdb.org/t/p/original/lWn8makNhCCrwetSTl5qjSCPVSo.jpg",i5:"https://image.tmdb.org/t/p/w500/lWn8makNhCCrwetSTl5qjSCPVSo.jpg",fb:"https://m.media-amazon.com/images/M/MV5BMjUyMjgzNTcyMl5BMl5BanBnXkFtZTgwMjY0NjIxNzE@._V1_.jpg"},
{id:18,t:"Breathing Room",y:2008,d:"John Suits, Gabriel Cowan",ti:"t4",tg:["thriller","survival game","puzzle"],r:2.4,w:"Strangers wake in a locked white room wearing explosive collars. Must figure out the rules or die.",sv:[],av:["Tubi"],im:"https://image.tmdb.org/t/p/original/nIXr3cYqFVSvHDiFqSEDfiGRxFz.jpg",i5:"https://image.tmdb.org/t/p/w500/nIXr3cYqFVSvHDiFqSEDfiGRxFz.jpg",fb:"https://m.media-amazon.com/images/M/MV5BMTYzMDUwMDEzOV5BMl5BanBnXkFtZTcwMjk2OTkyMg@@._V1_.jpg"},

{id:20,t:"The Bunker",y:2024,d:"Adrian Langley",ti:"t4",tg:["post-apocalyptic","bunker","survival"],r:2.6,w:"Survivors in a bunker after nuclear event. Resources dwindle, tensions rise, paranoia sets in.",sv:[],av:["Tubi","Amazon Prime"],im:"https://image.tmdb.org/t/p/original/v0cFjMoPFRSVJoOx1rPfjmGxqQW.jpg",i5:"https://image.tmdb.org/t/p/w500/v0cFjMoPFRSVJoOx1rPfjmGxqQW.jpg",fb:"https://m.media-amazon.com/images/M/MV5BODMxMjE0MmQtZjE4OC00NzQ4LWExZjAtOGRmZWRiYWViNTdmXkEyXkFqcGc@._V1_.jpg"}
];
var TM={t1:{l:"Direct Matches",n:"1",c:"t1"},t2:{l:"Claustrophobic",n:"2",c:"t2"},t3:{l:"Survival Pressure",n:"3",c:"t3"},t4:{l:"Adjacent Cuts",n:"4",c:"t4"}};

function ce(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e}
function tx(tag,cls,txt){var e=ce(tag,cls);e.textContent=txt;return e}
function mI(src,alt,cls,fbk){var i=ce("img",cls);i.src=src;i.alt=alt;i.loading="lazy";i.onerror=function(){i.onerror=null;i.src=fbk};return i}
function st(r){var s="";for(var i=0;i<Math.floor(r);i++)s+="\u2605";if(r%1>=.4)s+="\u00BD";return s+" "+r}
function ab(p,sv,av){(sv||[]).forEach(function(s){p.appendChild(tx("span","sb sv",s))});(av||[]).forEach(function(s){p.appendChild(tx("span","sb",s))})}

var snap=document.getElementById("snap"),dots=document.getElementById("dots");
var curIdx=0;

// Build scenes
D.forEach(function(m,idx){
  var ti=TM[m.ti];
  var scene=ce("div","scene");
  scene.dataset.idx=String(idx);
  scene.dataset.mid=String(m.id);

  // BG
  var bg=ce("div","scene-bg");
  bg.appendChild(mI(m.im,m.t,"",m.fb));
  var grade=ce("div","scene-grade grade-"+m.ti);
  bg.appendChild(grade);
  scene.appendChild(bg);

  // Letterbox
  scene.appendChild(ce("div","lbox-top"));
  scene.appendChild(ce("div","lbox-bot"));

  // Body
  var body=ce("div","scene-body");
  body.appendChild(tx("div","tier-badge tb-"+m.ti,"Tier "+ti.n+" \u2014 "+ti.l));
  body.appendChild(tx("h1","scene-title",m.t));

  var meta=ce("div","scene-meta");
  meta.appendChild(tx("span","rt",st(m.r)+"/5"));
  meta.appendChild(ce("span","dot"));
  meta.appendChild(tx("span","",String(m.y)));
  meta.appendChild(ce("span","dot"));
  meta.appendChild(tx("span","",m.d));
  body.appendChild(meta);

  body.appendChild(tx("p","scene-desc",m.w));

  var badges=ce("div","scene-badges");
  ab(badges,m.sv,m.av);
  body.appendChild(badges);

  var tap=tx("div","scene-tap","Tap for details \u2192");
  tap.addEventListener("click",function(e){e.stopPropagation();oD(m.id)});
  body.appendChild(tap);

  scene.appendChild(body);

  // Swipe hint on first
  if(idx===0){
    var hint=ce("div","swipe-hint");
    hint.id="swipeHint";
    var svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
    svg.setAttribute("width","20");svg.setAttribute("height","20");svg.setAttribute("viewBox","0 0 24 24");
    svg.setAttribute("fill","none");svg.setAttribute("stroke","currentColor");svg.setAttribute("stroke-width","2");
    var poly=document.createElementNS("http://www.w3.org/2000/svg","polyline");
    poly.setAttribute("points","6 9 12 15 18 9");
    svg.appendChild(poly);
    hint.appendChild(svg);
    hint.appendChild(tx("span","","Swipe up"));
    scene.appendChild(hint);
  }

  // Tap scene to open detail
  scene.addEventListener("click",function(){oD(m.id)});

  snap.appendChild(scene);

  // Dot
  var dot=ce("div","dot-i");
  dot.dataset.idx=String(idx);
  dot.addEventListener("click",function(){
    snap.children[idx].scrollIntoView({behavior:"smooth"});
  });
  dots.appendChild(dot);
});

// Scroll observer for in-view
var sceneObs=new IntersectionObserver(function(entries){
  entries.forEach(function(e){
    if(e.isIntersecting){
      e.target.classList.add("in");
      var idx=parseInt(e.target.dataset.idx);
      curIdx=idx;
      // Update dots
      document.querySelectorAll(".dot-i").forEach(function(d,i){
        d.classList.toggle("on",i===idx);
      });
      // Hide swipe hint after first scroll
      if(idx>0){var h=document.getElementById("swipeHint");if(h)h.style.display="none"}
    } else {
      e.target.classList.remove("in");
    }
  });
},{threshold:.6,root:snap});

document.querySelectorAll(".scene").forEach(function(s){sceneObs.observe(s)});

// Mark first as active
setTimeout(function(){
  if(snap.children[0])snap.children[0].classList.add("in");
  document.querySelectorAll(".dot-i")[0].classList.add("on");
},100);

// DETAIL PANEL
function oD(id){
  var m=D.find(function(x){return x.id===id});if(!m)return;
  var ov=document.getElementById("dOv"),pan=document.getElementById("dPan"),ti=TM[m.ti];
  while(pan.firstChild)pan.removeChild(pan.firstChild);
  pan.appendChild(ce("div","dp-handle"));
  var cl=ce("button","dp-close");cl.textContent="\u00D7";cl.addEventListener("click",cD);pan.appendChild(cl);
  var poster=ce("div","dp-poster");
  poster.appendChild(mI(m.i5,m.t,"",m.fb));
  poster.appendChild(ce("div","dp-poster-gr"));
  pan.appendChild(poster);
  var body=ce("div","dp-body");
  body.appendChild(tx("div","tier-badge tb-"+m.ti,"Tier "+ti.n+" \u2014 "+ti.l));
  body.appendChild(tx("h2","",m.t));
  var meta=ce("div","dp-meta");meta.appendChild(tx("span","rt",st(m.r)+"/5"));meta.appendChild(tx("span","",String(m.y)));meta.appendChild(tx("span","",m.d));body.appendChild(meta);
  body.appendChild(tx("div","dp-label","Synopsis"));body.appendChild(tx("p","dp-desc",m.w));
  body.appendChild(tx("div","dp-label","Genre"));
  var dtg=ce("div","dp-tags");m.tg.forEach(function(g){dtg.appendChild(tx("span","tag",g))});body.appendChild(dtg);
  body.appendChild(tx("div","dp-label","Where to Watch"));
  var ds=ce("div","dp-stream");
  if(!m.sv.length&&!m.av.length){ds.appendChild(tx("span","","\u2014 Not currently streaming"));ds.style.color="var(--txt3)";ds.style.fontSize="13px"}
  else ab(ds,m.sv,m.av);
  body.appendChild(ds);pan.appendChild(body);
  requestAnimationFrame(function(){ov.classList.add("on");pan.classList.add("on");document.body.style.overflow="hidden"});
}
function cD(){document.getElementById("dOv").classList.remove("on");document.getElementById("dPan").classList.remove("on");document.body.style.overflow=""}
document.getElementById("dOv").addEventListener("click",cD);

// SEARCH
var sOv=document.getElementById("sOv"),sIn=document.getElementById("sIn"),sRes=document.getElementById("sRes");
document.getElementById("sBtn").addEventListener("click",function(e){e.stopPropagation();sOv.classList.add("on");setTimeout(function(){sIn.focus()},100)});
document.getElementById("sCan").addEventListener("click",function(){sOv.classList.remove("on");sIn.value="";while(sRes.firstChild)sRes.removeChild(sRes.firstChild)});
sIn.addEventListener("input",function(){
  while(sRes.firstChild)sRes.removeChild(sRes.firstChild);
  var q=sIn.value.toLowerCase().trim();if(!q)return;
  var r=D.filter(function(m){return m.t.toLowerCase().indexOf(q)!==-1||m.d.toLowerCase().indexOf(q)!==-1||m.tg.some(function(g){return g.indexOf(q)!==-1})});
  if(!r.length){var np=tx("p","","No films found");np.style.cssText="color:var(--txt3);text-align:center;padding:40px 0";sRes.appendChild(np);return}
  r.forEach(function(m){
    var item=ce("div","sres-item");
    item.addEventListener("click",function(){sOv.classList.remove("on");sIn.value="";while(sRes.firstChild)sRes.removeChild(sRes.firstChild);
      // Scroll to that movie's scene
      var idx=D.indexOf(m);
      if(snap.children[idx])snap.children[idx].scrollIntoView({behavior:"smooth"});
    });
    var pw=ce("div","sres-poster");pw.appendChild(mI(m.i5,m.t,"",m.fb));item.appendChild(pw);
    var info=ce("div","sres-info");
    info.appendChild(tx("div","sres-title",m.t));
    info.appendChild(tx("div","sres-meta",m.y+" \u2022 "+m.d+" \u2022 "+st(m.r)));
    item.appendChild(info);
    sRes.appendChild(item);
  });
});

// SWIPE CLOSE DETAIL
var tsY=0,dP=document.getElementById("dPan");
dP.addEventListener("touchstart",function(e){tsY=e.touches[0].clientY},{passive:true});
dP.addEventListener("touchmove",function(e){if(e.touches[0].clientY-tsY>80&&dP.scrollTop<=0)cD()},{passive:true});
})();
</script>
